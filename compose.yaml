services:
  cfgview:
    build:
      context: .
      dockerfile: Dockerfile
    image: cfgview:local
    container_name: cfgview-app
    environment:
      - DISPLAY=${DISPLAY}
      - CFGVIEW_UI_SCALE=${CFGVIEW_UI_SCALE:-}
      - CFGVIEW_FONT_SCALE=${CFGVIEW_FONT_SCALE:-}
      - CFGVIEW_TABLE_ROW_HEIGHT=${CFGVIEW_TABLE_ROW_HEIGHT:-}
      - CFGVIEW_WINDOW_WIDTH=${CFGVIEW_WINDOW_WIDTH:-}
      - CFGVIEW_WINDOW_HEIGHT=${CFGVIEW_WINDOW_HEIGHT:-}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./data:/app/data
      - ./:/workspace:ro
    working_dir: /app/data
    restart: "no"
